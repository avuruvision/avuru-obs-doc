name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint front-matter
        run: npm run lint:docs

      - name: Build (all locales, fails on broken links)
        run: npm run build
