name: deploy

# Builds the site and publishes it to Hostinger over FTPS on every push to main.
# Required repo secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD.
# Optional repo variable:  FTP_SERVER_DIR (defaults to /public_html/).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Never let two deploys race the same remote.
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build (all locales)
        run: npm run build

      # lftp mirror is resilient to Hostinger's burst throttling: it reuses the
      # control connection and retries transient 425 data-connection errors with
      # backoff, instead of failing the whole deploy like a per-file uploader.
      - name: Publish to Hostinger (FTPS via lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          # This Hostinger FTP account is chrooted to the web root, so we land
          # directly in public_html — deploy to '.' (login dir), not '/public_html/'
          # (which would nest it as public_html/public_html). Override via the
          # FTP_SERVER_DIR repo variable if your account roots elsewhere.
          FTP_SERVER_DIR: ${{ vars.FTP_SERVER_DIR || './' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "
            set cmd:fail-exit true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 5;
            set net:timeout 25;
            set net:reconnect-interval-base 5;
            set ftp:use-mlsd true;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
            mirror --reverse --delete --no-perms --parallel=1 --verbose ./build/ \"$FTP_SERVER_DIR\";
          "
