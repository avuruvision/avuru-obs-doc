name: deploy

# Builds the site and publishes it to Hostinger over FTPS on every push to main.
# Required repo secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD.
# The account is chrooted to the web root, so we upload straight to the login
# directory ('.') — no server-dir variable needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Never let two deploys race the same remote.
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build (all locales)
        run: npm run build

      # lftp mirror is resilient to Hostinger's burst throttling: it reuses the
      # control connection and retries transient 425 data-connection errors with
      # backoff, instead of failing the whole deploy like a per-file uploader.
      - name: Publish to Hostinger (FTPS via lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          # This Hostinger FTP account is chrooted to the web root, so the login
          # directory IS public_html. Upload straight there ('.') — never into a
          # '/public_html/' subpath, which nests as public_html/public_html.
          # `pwd` is logged so the login directory is visible if anything's off.
          #
          # An earlier deploy that uploaded into '/public_html/' left a stray
          # 'public_html' directory inside the web root. With cmd:fail-exit on,
          # `mirror --delete` aborts the whole job trying to remove it ("Removing
          # old directory `public_html' ... 550 ... No such file or directory").
          # --exclude keeps the relic out of the delete scan so deploys complete;
          # it serves nothing (404) and can be deleted by hand from the FTP panel.
          lftp -c "
            set cmd:fail-exit true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 5;
            set net:timeout 25;
            set net:reconnect-interval-base 5;
            set ftp:use-mlsd true;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
            echo '--- FTP login directory: ---';
            pwd;
            mirror --reverse --delete --no-perms --parallel=1 --verbose --exclude=^public_html ./build/ .;
          "
